version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: safeconnect
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    command: ['redis-server', '--appendonly', 'yes', '--save', '60', '1000']
    volumes:
      - redisdata:/data

  dispatcher-api:
    build:
      context: .
      dockerfile: apps/dispatcher-api/Dockerfile
    restart: always
    env_file:
      - .env.production
    depends_on:
      - postgres
      - redis
    ports:
      - '3001:3001'

  dispatcher-web:
    build:
      context: .
      dockerfile: apps/dispatcher-web/Dockerfile
    restart: always
    env_file:
      - apps/dispatcher-web/.env.production
    depends_on:
      - dispatcher-api
    ports:
      - '3000:3000'

volumes:
  pgdata:
  redisdata:
