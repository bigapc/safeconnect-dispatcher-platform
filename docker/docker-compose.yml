version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: safeconnect
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  dispatcher-api:
    build:
      context: ..
      dockerfile: docker/dispatcher-api.Dockerfile
    env_file:
      - ../.env
    ports:
      - '3001:3001'
    depends_on:
      - postgres

  dispatcher-web:
    build:
      context: ..
      dockerfile: docker/dispatcher-web.Dockerfile
    env_file:
      - ../apps/dispatcher-web/.env.local
    ports:
      - '3000:3000'
    depends_on:
      - dispatcher-api

volumes:
  pgdata:
